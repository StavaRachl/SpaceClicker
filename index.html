<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Clicker</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <main>
        <div class="wrapper">
            <div class="btn">
                <button id="minus-btn">-</button>
            </div>
            <div class="counter">
                <h1 id="counter">0</h1>
            </div>
            <div class="btn">
                <button id="plus-btn">+</button>
            </div>
            <div class="reset-btn">
                <button id="reset-btn">
                    clear
                </button>
            </div>
        </div>
    </main>

    <script src="script/index.js"></script>
</body>
</html>
